<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Tema global empresa -->
  <link rel="stylesheet" href="assets/css/theme-global.css">
  <!-- Estilos para módulos -->
  <link rel="stylesheet" href="assets/css/modules-styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-boxes me-2"></i>SISTEMA CSM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <!-- Navegación unificada con módulos adicionales -->
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="suppliers.html">Proveedores</a></li>
          <li class="nav-item"><a class="nav-link" href="quotes.html">Cotizaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Ventas</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Reportes</a></li>
          <!-- Ajustes eliminado -->
          <li class="nav-item" id="nav-accounting" style="display:none;"><a class="nav-link" href="accounting.html">Contabilidad</a></li>
          <li class="nav-item"><a class="nav-link" href="fuel.html">Combustible</a></li>
          <li class="nav-item" id="nav-users" style="display:none;"><a class="nav-link active" href="users.html">Usuarios</a></li>
        </ul>
        <span class="navbar-text me-3" id="nav-user"></span>
        <!-- Botón tema -->
        <button class="btn btn-outline-light me-2" id="themeToggleBtn">Modo oscuro</button>
        <button class="btn btn-outline-light" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Usuarios</h3>
      <button class="btn btn-success" id="btnAddUser">Nuevo usuario</button>
    </div>
    <table class="table table-striped" id="userTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre de usuario</th>
          <th>Rol</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="userForm">
            <div class="mb-3"><label class="form-label">Nombre de usuario</label><input type="text" class="form-control" id="newUsername" required></div>
            <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" id="newPassword" required></div>
            <div class="mb-3"><label class="form-label">Rol</label>
              <select id="roleSelect" class="form-select"></select>
            </div>
            <!-- Campo para subir una foto de usuario (opcional) -->
            <div class="mb-3">
              <label class="form-label">Foto de usuario</label>
              <input type="file" class="form-control" id="userPhoto" accept="image/*" capture="user">
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme-handler.js"></script>
  <script src="assets/js/users.js"></script>
</body>
</html>
