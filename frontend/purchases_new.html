  <!-- Tema global empresa -->
  <link rel="stylesheet" href="assets/css/theme-global.css">
  <!-- Estilos para módulos -->
  <link rel="stylesheet" href="assets/css/modules-styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-boxes me-2"></i>SISTEMA CSM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <!-- Navegación unificada con módulos adicionales -->
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="suppliers.html">Proveedores</a></li>
          <li class="nav-item"><a class="nav-link" href="quotes.html">Cotizaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Ventas</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Reportes</a></li>
          <!-- Ajustes eliminado -->

      </div>
    </div>
  </nav>
  <div class="container my-4">
    <h3>Registrar entrada de mercancía</h3>
    <div class="mb-3">
      <label class="form-label">Proveedor</label>
      <input type="text" class="form-control" id="purchaseSupplier" disabled>
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Fecha de entrada</label>
        <input type="date" id="purchaseDate" class="form-control" value="">
      </div>
      <div class="col-md-4">
        <label class="form-label">Forma de pago</label>
        <select id="purchasePayment" class="form-select">
          <option value="PENDIENTE" selected>Pendiente</option>
          <option value="EFECTIVO">Efectivo</option>
          <option value="TRANSFERENCIA">Transferencia</option>
          <option value="CUENTA">Cuenta</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">¿Considerar IVA?</label>
        <select id="purchaseVat" class="form-select">
          <option value="0">No</option>
          <option value="1">Sí</option>
        </select>
      </div>
    </div>
	    <div class="row g-3 mt-2" id="purchasePaymentDetails">
	      <div class="col-md-4">
	        <label class="form-label">Folio (factura/remisión/nota)</label>
	        <input type="text" id="purchaseFolio" class="form-control" placeholder="Ej. F-12345">
	      </div>
	      <div class="col-md-4">
	        <label class="form-label" id="purchaseAccountLabel">Caja/Cuenta</label>
	        <select id="purchaseAccount" class="form-select"></select>
	        <div class="form-text" id="purchaseAccountHelp">Seleccione de dónde sale el dinero.</div>
	      </div>
	      <div class="col-md-4" id="purchaseBankOpWrap" style="display:none;">
	        <label class="form-label">Núm. operación / referencia bancaria</label>
	        <input type="text" id="purchaseBankOp" class="form-control" placeholder="Ej. 000123456">
	      </div>
	    </div>
    <div class="mt-3">
      <label class="form-label">Factura o recibo</label>
	      <input type="file" id="purchaseReceipt" class="form-control" accept="image/*,application/pdf" capture="environment">
    </div>
    <div class="mt-4">
      <h5>Detalle de productos</h5>
      <div class="row g-3 align-items-end">
        <div class="col-lg-4 col-md-6">
          <label class="form-label">Producto</label>
          <select id="itemProduct" class="form-select"></select>
        </div>
        <div class="col-lg-2 col-md-6">
          <label class="form-label">Presentación</label>
          <select id="itemPresentation" class="form-select">
            <option value="PIEZA">Pieza</option>
            <option value="CAJA">Caja</option>
            <option value="ROLLO">Rollo</option>
            <option value="OTRO">Otro</option>
          </select>
        </div>
        <div class="col-lg-1 col-md-4">
          <label class="form-label">Cantidad</label>
          <input type="number" step="0.01" id="itemQuantity" class="form-control">
        </div>
        <div class="col-lg-2 col-md-4">
          <label class="form-label">Precio unitario</label>
          <input type="number" step="0.01" id="itemUnitPrice" class="form-control">
        </div>
        <div class="col-lg-1 col-md-4">
          <label class="form-label">Margen</label>
          <input type="number" step="0.001" id="itemProfitMargin" class="form-control" placeholder="0.180">
        </div>
        <div class="col-lg-2 col-md-6">
          <label class="form-label">Precio venta</label>
          <input type="number" step="0.01" id="itemPublicPrice" class="form-control" placeholder="0.00">
        </div>
        <div class="col-lg-1 col-md-6">
          <button id="btnAddItem" class="btn btn-success w-100">Agregar</button>
        </div>
      </div>
      <table class="table table-sm table-bordered mt-3" id="itemsTable">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Presentación</th>
            <th>Cantidad</th>
            <th>Precio unitario</th>
            <th>Importe</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <th colspan="4" class="text-end">Total</th>
            <th id="itemsTotal">$0.00</th>
            <th></th>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="mt-3">
      <label class="form-label">Observaciones</label>
      <textarea class="form-control" id="purchaseNotes" rows="2"></textarea>
    </div>
    <button id="btnFinalizePurchase" class="btn btn-primary mt-3">Finalizar entrada</button>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme-handler.js"></script>
  <script src="assets/js/purchases.js"></script>
</body>
</html>
