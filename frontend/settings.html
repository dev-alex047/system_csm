<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajustes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Tema global empresa -->
  <link rel="stylesheet" href="assets/css/theme-global.css">
  <!-- Estilos para módulos -->
  <link rel="stylesheet" href="assets/css/modules-styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-boxes me-2"></i>SISTEMA CSM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <!-- Navegación unificada con módulos adicionales -->
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="suppliers.html">Proveedores</a></li>
          <li class="nav-item"><a class="nav-link" href="quotes.html">Cotizaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Ventas</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Reportes</a></li>
          <li class="nav-item"><a class="nav-link active" href="settings.html">Ajustes</a></li>
          <li class="nav-item" id="nav-accounting" style="display:none;"><a class="nav-link" href="accounting.html">Contabilidad</a></li>
          <li class="nav-item"><a class="nav-link" href="fuel.html">Combustible</a></li>
          <li class="nav-item" id="nav-users" style="display:none;"><a class="nav-link" href="users.html">Usuarios</a></li>
        </ul>
        <span class="navbar-text me-3" id="nav-user"></span>
        <button class="btn btn-outline-light" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>
  <div class="container my-4">
    <h3>Ajustes de empresa</h3>
    <form id="settingsForm">
      <div class="mb-3"><label class="form-label">Nombre de la empresa</label><input type="text" class="form-control" id="companyName" required></div>
      <div class="mb-3"><label class="form-label">Color primario</label><input type="color" class="form-control form-control-color" id="primaryColor"></div>
      <div class="mb-3"><label class="form-label">Color secundario</label><input type="color" class="form-control form-control-color" id="secondaryColor"></div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Tamaño de letra</label>
          <!-- Selector de tamaño de letra: valores en rem -->
          <select id="fontSize" class="form-select">
            <option value="0.85rem">Pequeño</option>
            <option value="1rem">Normal</option>
            <option value="1.15rem">Grande</option>
          </select>
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" id="darkModeAuto">
            <label class="form-check-label" for="darkModeAuto">
              Modo oscuro automático
            </label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </form>
    <hr>
    <h5>Logotipo</h5>
    <img id="logoPreview" src="" alt="Logo" style="max-width:200px; max-height:150px;" class="d-block mb-3">
    <input type="file" id="logoInput" accept="image/*" class="form-control mb-3">
    <button class="btn btn-secondary" id="btnUploadLogo">Subir logo</button>

    <hr>
    <h5>Vista previa</h5>
    <div class="row row-cols-1 row-cols-md-3 g-3" id="previewContainer">
      <div class="col">
        <div class="border rounded" id="previewPage" style="overflow:hidden;">
          <div class="p-2 text-white" style="background-color: var(--primary-color, #0d6efd);">
            Sistema CSM
          </div>
          <div class="p-2" style="background-color: var(--secondary-color, #6c757d); color:white;">
            Página principal
          </div>
        </div>
      </div>
      <div class="col">
        <div class="border rounded" id="previewTicket" style="overflow:hidden;">
          <div class="p-2 text-white" style="background-color: var(--primary-color, #0d6efd);">
            Ticket de venta
          </div>
          <div class="p-2" style="background-color: var(--secondary-color, #6c757d); color:white;">
            Lista de productos...
          </div>
        </div>
      </div>
      <div class="col">
        <div class="border rounded" id="previewQuote" style="overflow:hidden;">
          <div class="p-2 text-white" style="background-color: var(--primary-color, #0d6efd);">
            Cotización
          </div>
          <div class="p-2" style="background-color: var(--secondary-color, #6c757d); color:white;">
            Tabla de cotización...
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme-handler.js"></script>
  <script src="assets/js/settings.js"></script>
</body>
</html>
