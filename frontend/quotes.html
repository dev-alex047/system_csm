<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizaciones</title>
  <!-- Carga Bootstrap desde CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Carga tu CSS si existe -->
  <link rel="stylesheet" href="assets/css/styles.css">
  <!-- Tema global empresa -->
  <link rel="stylesheet" href="assets/css/theme-global.css">
  <style>
    .navbar-custom { background-color: #23a227; }
    /* Overlay para el escáner */
    .scanner-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .scanner-box {
      width: min(920px, 95vw);
      height: min(560px, 85vh);
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .scanner-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-boxes me-2"></i>SISTEMA CSM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="suppliers.html">Proveedores</a></li>
          <li class="nav-item"><a class="nav-link active" href="quotes.html">Cotizaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Ventas</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Reportes</a></li>
        </ul>
        <span class="navbar-text me-3" id="nav-user"></span>
        <button class="btn btn-outline-light me-2" id="themeToggleBtn">Modo oscuro</button>
        <button class="btn btn-outline-light" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <h3 class="mb-3">Cotización</h3>
    <!-- Datos generales -->
    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-control" id="quoteDate">
      </div>
      <div class="col-md-4">
        <label class="form-label">Lugar</label>
        <input type="text" class="form-control" id="quotePlace" value="SAN MARTIN HUAMELULPAM, TLAXIACO, OAXACA" placeholder="Ciudad, Estado">
      </div>
      <div class="col-md-4">
        <label class="form-label">Para</label>
        <input type="text" class="form-control" id="quoteRecipient" placeholder="Destinatario">
      </div>
    </div>

    <!-- Checkbox único de IVA -->
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="includeIva" checked>
      <label class="form-check-label" for="includeIva">Incluir IVA (16%)</label>
    </div>

    <!-- Buscador -->
    <div class="mb-3">
      <label class="form-label">Buscar producto (nombre / código / barras)</label>
      <input id="searchProduct" class="form-control" list="productList"
             placeholder="Ej: Broca 1/4, 9000, 750123..." autocomplete="off">
      <datalist id="productList"></datalist>
      <small class="text-muted">Escribe y presiona Enter para agregar, o usa “Escanear”.</small>
    </div>

    <!-- Controles -->
    <div class="row mb-3">
      <div class="col-sm-4 col-md-3 col-lg-2">
        <button id="btnScan" class="btn btn-outline-secondary w-100">Escanear</button>
      </div>
      <div class="col-sm-4 col-md-3 col-lg-2">
        <input id="quantityInput" type="number" min="0" step="1" value="1" class="form-control">
      </div>
      <div class="col-sm-4 col-md-3 col-lg-2">
        <button id="btnAdd" class="btn btn-warning w-100">Agregar</button>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-responsive">
      <table class="table table-bordered" id="quoteTable">
        <thead class="table-dark">
          <tr>
            <th>Descripción</th>
            <th>Cantidad</th>
            <th>Unidad</th>
            <th>Precio</th>
            <th>Importe</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <th colspan="4" class="text-end">Subtotal</th>
            <th id="subtotalCell">$0.00</th>
            <th></th>
          </tr>
          <tr>
            <th colspan="4" class="text-end">IVA 16%</th>
            <th id="ivaCell">$0.00</th>
            <th></th>
          </tr>
          <tr>
            <th colspan="4" class="text-end">Total</th>
            <th id="totalCell">$0.00</th>
            <th></th>
          </tr>
        </tfoot>
      </table>
    </div>

    <!-- Botones principales -->
    <div class="d-flex justify-content-end">
      <button class="btn btn-success me-auto" id="btnAddRow">Agregar fila</button>
      <button class="btn btn-primary" id="btnGenerate">Generar PDF</button>
    </div>
  </div>

  <!-- Overlay del escáner -->
  <div class="scanner-overlay" id="scannerOverlay">
    <div class="scanner-box">
      <div class="scanner-actions">
        <button class="btn btn-sm btn-danger" id="btnCloseScanner">Cerrar</button>
      </div>
      <div id="scannerView"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/theme-handler.js"></script>
  <script src="assets/js/quotes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
