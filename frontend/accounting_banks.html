<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentas bancarias</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Tema global empresa -->
  <link rel="stylesheet" href="assets/css/theme-global.css">
  <!-- Estilos para módulos -->
  <link rel="stylesheet" href="assets/css/modules-styles.css">
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/responsive-tables.css" />
</head>
<body class="bg-dark text-light">
  <div id="navContainer"></div>

  <div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h2 class="m-0">Cuentas (cajas y bancos)</h2>
      <a class="btn btn-outline-light" href="accounting.html">Regresar</a>
    </div>

    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <div class="d-flex gap-2 align-items-center mb-3">
          <select class="form-select form-select-sm w-auto" id="accountsCategory">
            <option value="">Todas</option>
            <option value="CAJA">Efectivo (CAJA)</option>
            <option value="BANCO">Bancos</option>
          </select>
          <select class="form-select form-select-sm w-auto" id="accountsActive">
            <option value="">Todas</option>
            <option value="1" selected>Activas</option>
            <option value="0">Inactivas</option>
          </select>
          <button class="btn btn-sm btn-outline-light" id="btnReloadAccounts">Recargar</button>
          <button class="btn btn-sm btn-primary" id="btnNewAccount">Nueva cuenta</button>
        </div>

        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover align-middle" id="accountsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th class="text-end">Saldo inicial</th>
                <th>Activo</th>
                <th class="text-end">Saldo actual</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="7" class="text-center">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal cuenta -->
  <div class="modal fade" id="accModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="accModalTitle">Cuenta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="accId">
          <div class="mb-2">
            <label class="form-label">Nombre</label>
            <input class="form-control" id="accName" placeholder="Ej. OFICINA / BANAMEX" />
          </div>
          <div class="mb-2">
            <label class="form-label">Categoría</label>
            <select class="form-select" id="accCategory">
              <option value="CAJA">CAJA (efectivo)</option>
              <option value="BANCO">BANCO</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Saldo inicial</label>
            <input class="form-control" id="accInitial" type="number" step="0.01" value="0" />
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="accActive" checked>
            <label class="form-check-label" for="accActive">Activa</label>
          </div>
          <small class="text-muted d-block mt-2">Nota: la clasificación CAJA/BANCO define qué cuentas se muestran al cobrar/pagar.</small>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnSaveAccount">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>  <script src="assets/js/theme-handler.js"></script>  <script src="assets/js/accounting_banks.js?v=1"></script>
</body>
</html>
